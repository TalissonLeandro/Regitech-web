<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Controle de Equipamentos</title>
    <link rel="stylesheet" href="login-styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-content">
            <div class="login-box">
                <div class="login-header">
                    <h1>Criar Conta</h1>
                    <p>Cadastre-se para acessar o sistema</p>
                </div>

                <form id="registerForm" class="login-form">
                    <div class="form-group">
                        <label for="fullName">Nome Completo:</label>
                        <input type="text" id="fullName" required placeholder="Digite seu nome completo">
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" required placeholder="Digite seu email">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Senha:</label>
                        <input type="password" id="password" required placeholder="Digite sua senha (mín. 6 caracteres)">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Senha:</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirme sua senha">
                    </div>
                    
                    <button type="submit" class="login-btn">Criar Conta</button>
                    
                    <div id="errorMessage" class="error-message"></div>
                    <div id="successMessage" class="success-message"></div>
                </form>
                
                <div class="login-links">
                    <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
                </div>
            </div>

            <div class="logo-section">
                <img src="InveTI (2).png" alt="RegTech Logo" class="login-logo">
            </div>
        </div>
    </div>
    
    <script src="register.js"></script>
</body>

</html>
