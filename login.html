<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a</title>
    <link rel="stylesheet" href="login-styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-content">
            <div class="login-box">
                <div class="login-header">
                    <h1>Sistema de Controle de Equipamentos</h1>
                    <p>Faça login para acessar o sistema</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Email:</label>
                        <input type="text" id="username" required placeholder="Digite seu email">
                    </div>

                    <div class="form-group">
                        <label for="password">Senha:</label>
                        <input type="password" id="password" required placeholder="Digite sua senha">
                    </div>

                    <button type="submit" class="login-btn">Entrar</button>

                    <div id="errorMessage" class="error-message"></div>
                </form>

                <div class="login-links">
                    <p>Não tem uma conta? <a href="register.html">Cadastre-se</a></p>
                </div>
            </div>

            <div class="logo-section">
                <img src="Reigtech.png" alt="Reigtech Logo" class="login-logo">
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
